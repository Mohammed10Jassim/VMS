server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-message: "never"
    include-binding-errors: "never"

spring:
  jackson:
    time-zone: UTC
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

  datasource:
    url: jdbc:mysql://PROD_HOST:3306/visitorManagementSystem?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=UTC
    username: PROD_USER
    password: "PROD_PASS"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: VMS-HikariPool
      maximum-pool-size: 40
      minimum-idle: 10
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1500000
      connection-init-sql: "SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci"

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        generate_statistics: false

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF

app:
  pass:
    # Use your real public HTTPS domain here
    scan-base-url: "https://YOUR_DOMAIN/public/passes/scan"
    # Load secret from env/secret manager in prod; fallback only for local prod tests
    qr-secret: "${QR_SECRET:change-me-in-prod}"
    # Usually same as initial pass validity window in seconds
    qr-ttl-seconds: 7200


