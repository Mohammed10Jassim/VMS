# application.properties (updated)

spring.application.name=VisitorManagementSystem
spring.profiles.active=dev

# --- shared HTTP/server ---
server.connection-timeout=10s
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/plain,text/xml,text/html,text/css,application/javascript
spring.web.resources.cache.cachecontrol.max-age=3600
server.address=0.0.0.0

# --- shared JPA ---
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.batch_versioned_data=true

# --- error defaults (overridden in prod) ---
server.error.include-message=always
server.error.include-binding-errors=always
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# --- JWT (shared) ---
jwt.secret=U9alzQ2pR7xLd8Fj3Wk6vNOsT0j1z8q1L3xY0hYwmE4nV
jwt.secret.previous=Z7yd04mV1Lk9Pj6Nw3sR8vT2q1hY0gY2eE4nXU

# 1 Day
jwt.expiration-minutes=1440

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Where (optional) uploaded files live on disk. If not found, pass still renders.
app.storage.root=./storage

# Pass settings
app.pass.default-validity-minutes=120
app.pass.gate-no=GATE-1
app.company.name=Rishikirti Technologies Pvt Ltd
app.company.address=A-6, 2nd Floor, near Noida Sector 16 Metro Station, A Block, Sector 16, Noida, Uttar Pradesh 201301

# Tell the service to read the logo from the classpath
app.company.logo-path=classpath:/static/logo.png

# QR scan base URL (public)
app.pass.scan-base-url=http://192.168.0.224:8099/rkt/public/passes/scan

# HMAC secret for signing scan tokens (use a long random string in prod)
app.pass.qr-secret=dev-very-secret-change-me

# Tokens TTL (seconds); typical: same as initial validity window
app.pass.qr-ttl-seconds=7200

# Office policy
app.office.timezone=Asia/Kolkata

# 8PM Local Time
app.office.close-hour=20

# enforce: admin-created (web) passes must be for *today* only55=-=[
app.pass.web-same-day-only=true
app.pass.web-same-day-mode=reject

# --- Mail / Approval settings ---
app.mail.enabled=true
# prefer using a verified domain email — change in env rather than hardcode
app.mail.from=${GMAIL_USER:${spring.mail.username:}}

# backend approval endpoint (this server)
app.mail.approval-backend-url=http://192.168.0.224:8099/rkt/visitors/respond

# frontend pretty link (optional) - set to your public UI if you want
app.frontend.approval-base-url=https://rkt.visitors.com/approve


# minutes
app.mail.approval-session-ttl-minutes=15

# TTLs
app.mail.initial-approval-ttl-hours=4
app.mail.confirmation-ttl-minutes=15

# Rate-limiting
app.security.rate-limit.ip.maxAttemptsPerHour=200
app.security.rate-limit.visitor.maxInvalidAttempts=5
app.security.rate-limit.visitor.invalidWindowMinutes=15


app.approval.cleanup-ms=60000



# Mail templates used by pass emailing
app.mail.subject-template=[Visitor Pass] %s
app.mail.body-template=Hi %s,\n\nYour visitor pass has been generated. Please find the PDF attached.\nShow the QR at the gate for check-in/out.\n\nRegards,\nSecurity Desk

#Mail properties

# Ensure LOB creation uses non-contextual creation (prevents some driver issues)
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Mail timeouts & socket reuse
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
# If your JavaMail supports pooling (depends on provider/version), enable it:
spring.mail.properties.mail.smtp.pool=true

# Prefer url-safe short tokens for email links (advise in docs)
app.mail.token-encoding=hex
# Serve uploaded files via configured base URL
app.storage.public-base-url=${storage.public-base-url:http://localhost:8099/files}

# Optional: don't log SQL in dev unless debugging
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

springdoc.swagger-ui.path=/docs

